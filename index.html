<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    
    const padsData = {};
    for (let i = 1; i <= 8; i++) {
        padsData[i] = { 
            rawBuffer: null, start: 0, end: 1, pitch: 1, dist: 0, 
            filter: 20000, delayMix: 0, isLooping: false, interval: 4, timerId: null 
        };
    }

    let currentPad = 1;
    let mediaRecorder;
    let audioChunks = [];
    let bpm = 120;
    let globalMute = false;

    // DOM Links
    const padsEls = document.querySelectorAll('.pad');
    const recordBtn = document.getElementById('record-btn');
    const muteAllBtn = document.getElementById('mute-all-btn');
    const trimStartSlider = document.getElementById('trim-start');
    const trimEndSlider = document.getElementById('trim-end');
    const pitchSlider = document.getElementById('fx-pitch');
    const distSlider = document.getElementById('fx-dist');
    const filterSlider = document.getElementById('fx-filter');
    const delaySlider = document.getElementById('fx-delay');
    const loopToggleBtn = document.getElementById('loop-toggle-btn');
    const loopIntervalSlider = document.getElementById('loop-interval');
    const bpmInput = document.getElementById('bpm');

    // Bulletproof Audio Initialization
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function selectPad(id) {
        currentPad = id;
        padsEls.forEach(p => p.classList.remove('selected'));
        document.querySelector(`[data-pad="${id}"]`).classList.add('selected');
        document.getElementById('selected-pad-title').innerText = `Modulating Pad ${id}`;
        
        const data = padsData[id];
        trimStartSlider.value = data.start * 100;
        document.getElementById('start-val').innerText = Math.round(data.start * 100) + '%';
        trimEndSlider.value = data.end * 100;
        document.getElementById('end-val').innerText = Math.round(data.end * 100) + '%';
        pitchSlider.value = data.pitch;
        document.getElementById('pitch-val').innerText = data.pitch.toFixed(2) + 'x';
        distSlider.value = data.dist;
        document.getElementById('fx-dist-val').innerText = data.dist > 0 ? data.dist + '%' : 'Off';
        filterSlider.value = data.filter;
        document.getElementById('fx-filter-val').innerText = data.filter === 20000 ? 'Max' : data.filter + 'Hz';
        delaySlider.value = data.delayMix;
        document.getElementById('fx-delay-val').innerText = data.delayMix > 0 ? data.delayMix + '%' : 'Off';
        
        if (data.isLooping) {
            loopToggleBtn.innerText = "Loop On";
            loopToggleBtn.classList.add('active');
        } else {
            loopToggleBtn.innerText = "Loop Off";
            loopToggleBtn.classList.remove('active');
        }
        loopIntervalSlider.value = data.interval;
        document.getElementById('interval-val').innerText = data.interval + (data.interval === 1 ? ' Beat' : ' Beats');
    }

    function playPad(id, isLoopTrigger = false) {
        if (globalMute && isLoopTrigger) return; 
        
        initAudio();
        const data = padsData[id];
        if (!data.rawBuffer) return;

        const padEl = document.querySelector(`[data-pad="${id}"]`);
        padEl.classList.add('playing');
        setTimeout(() => padEl.classList.remove('playing'), 120);

        const source = audioCtx.createBufferSource();
        source.buffer = data.rawBuffer;
        source.playbackRate.value = data.pitch;

        const duration = data.rawBuffer.duration;
        const startTime = data.start * duration;
        const durationToPlay = (data.end * duration) - startTime;

        let currentNode = source;

        if (data.dist > 0) {
            const distortion = audioCtx.createWaveShaper();
            distortion.curve = makeDistortionCurve(data.dist * 2);
            distortion.oversample = '4x';
            currentNode.connect(distortion);
            currentNode = distortion;
        }

        if (data.filter < 20000) {
            const filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(data.filter, audioCtx.currentTime);
            currentNode.connect(filterNode);
            currentNode = filterNode;
        }

        if (data.delayMix > 0) {
            const delayNode = audioCtx.createDelay();
            const feedbackNode = audioCtx.createGain();
            const mixNode = audioCtx.createGain();

            delayNode.delayTime.value = (60 / bpm) * 0.5; 
            feedbackNode.gain.value = 0.4; 
            mixNode.gain.value = data.delayMix / 100;

            currentNode.connect(audioCtx.destination); 
            
            currentNode.connect(delayNode);
            delayNode.connect(feedbackNode);
            feedbackNode.connect(delayNode); 
            delayNode.connect(mixNode);
            mixNode.connect(audioCtx.destination);
        } else {
            currentNode.connect(audioCtx.destination);
        }

        if (durationToPlay > 0) {
            source.start(0, startTime, durationToPlay);
        }
    }

    function makeDistortionCurve(amount) {
        const k = amount;
        const n_samples = 44100;
        const curve = new Float32Array(n_samples);
        const deg = Math.PI / 180;
        for (let i = 0 ; i < n_samples; ++i ) {
            const x = (i * 2) / n_samples - 1;
            curve[i] = ( (3 + k) * x * 20 * deg ) / ( Math.PI + k * Math.abs(x) );
        }
        return curve;
    }

    function setupLoop(id) {
        const data = padsData[id];
        if (data.timerId) clearInterval(data.timerId);
        if (!data.isLooping || !data.rawBuffer) return;

        const intervalMs = (60 / bpm) * data.interval * 1000;
        playPad(id, true);
        data.timerId = setInterval(() => playPad(id, true), intervalMs);
    }

    // New Dual-Action Tap Handler to satisfy strict mobile security rules
    function setupFastTap(element, callback) {
        let triggered = false;

        element.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            triggered = true;
            initAudio(); // Unlocks audio engine instantly
            callback(e);
        }, { passive: false });

        element.addEventListener('click', (e) => {
            if (triggered) { 
                triggered = false; // Reset flag and skip if touchstart already fired
                return; 
            }
            initAudio(); // Essential fallback step for strict Android WebViews
            callback(e);
        });
    }

    setupFastTap(muteAllBtn, () => {
        globalMute = !globalMute;
        if (globalMute) {
            muteAllBtn.innerText = "Loops Muted";
            muteAllBtn.classList.add('active');
        } else {
            muteAllBtn.innerText = "Mute Loops";
            muteAllBtn.classList.remove('active');
        }
    });

    setupFastTap(loopToggleBtn, () => {
        const data = padsData[currentPad];
        data.isLooping = !data.isLooping;
        setupLoop(currentPad);
        selectPad(currentPad);
    });

    setupFastTap(recordBtn, async () => {
        initAudio();
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            recordBtn.classList.remove('recording');
            recordBtn.innerText = "● Record Mic";
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    
                    audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                        padsData[currentPad].rawBuffer = buffer;
                        const targetPad = document.querySelector(`[data-pad="${currentPad}"]`);
                        targetPad.classList.add('has-sample');
                        targetPad.querySelector('.pad-status').innerText = "Assigned";
                        selectPad(currentPad); 
                    }, (err) => {
                        alert("Audio parsing error. Try talking longer.");
                    });
                };

                mediaRecorder.start();
                recordBtn.classList.add('recording');
                recordBtn.innerText = "■ Stop Recording";
            } catch (err) {
                alert("Microphone connection failed. Check your browser site privacy permissions.");
            }
        }
    });

    padsEls.forEach(pad => {
        setupFastTap(pad, () => {
            const id = parseInt(pad.dataset.pad);
            selectPad(id);
            playPad(id, false);
        });
    });

    // --- Control Sliders Listener Set ---
    trimStartSlider.addEventListener('input', (e) => {
        const val = e.target.value / 100;
        if (val < padsData[currentPad].end) {
            padsData[currentPad].start = val;
            document.getElementById('start-val').innerText = e.target.value + '%';
        } else { e.target.value = padsData[currentPad].start * 100; }
    });

    trimEndSlider.addEventListener('input', (e) => {
        const val = e.target.value / 100;
        if (val > padsData[currentPad].start) {
            padsData[currentPad].end = val;
            document.getElementById('end-val').innerText = e.target.value + '%';
        } else { e.target.value = padsData[currentPad].end * 100; }
    });

    pitchSlider.addEventListener('input', (e) => {
        padsData[currentPad].pitch = parseFloat(e.target.value);
        document.getElementById('pitch-val').innerText = padsData[currentPad].pitch.toFixed(2) + 'x';
    });

    distSlider.addEventListener('input', (e) => {
        padsData[currentPad].dist = parseInt(e.target.value);
        document.getElementById('fx-dist-val').innerText = e.target.value > 0 ? e.target.value + '%' : 'Off';
    });

    filterSlider.addEventListener('input', (e) => {
        padsData[currentPad].filter = parseInt(e.target.value);
        document.getElementById('fx-filter-val').innerText = padsData[currentPad].filter === 20000 ? 'Max' : padsData[currentPad].filter + 'Hz';
    });

    delaySlider.addEventListener('input', (e) => {
        padsData[currentPad].delayMix = parseInt(e.target.value);
        document.getElementById('fx-delay-val').innerText = e.target.value > 0 ? e.target.value + '%' : 'Off';
    });

    loopIntervalSlider.addEventListener('input', (e) => {
        padsData[currentPad].interval = parseInt(e.target.value);
        document.getElementById('interval-val').innerText = e.target.value + (e.target.value == 1 ? ' Beat' : ' Beats');
        if(padsData[currentPad].isLooping) setupLoop(currentPad);
    });

    bpmInput.addEventListener('input', (e) => {
        let val = parseInt(e.target.value);
        if (isNaN(val) || val < 60) return;
        bpm = val;
        for (let id in padsData) {
            if (padsData[id].isLooping) setupLoop(id);
        }
    });

    selectPad(1);
</script>
