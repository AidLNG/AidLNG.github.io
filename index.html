<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Sampler & Beat Maker</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --accent-color: #00e5ff;
            --pad-color: #333;
            --pad-active: #00e5ff;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        h1, h2 {
            text-align: center;
            margin: 5px 0;
            color: var(--accent-color);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .panel {
            background: var(--panel-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Recorder & Splicer Controls */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        button {
            background: #444;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            flex: 1;
            cursor: pointer;
            touch-action: manipulation;
        }

        button:active {
            filter: brightness(1.2);
        }

        button.recording {
            background: #ff1744;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .slider-group label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
        }

        /* Pad Grid */
        .pad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .pad {
            background: var(--pad-color);
            border: 2px solid #555;
            border-radius: 10px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .pad.selected {
            border-color: var(--accent-color);
        }

        .pad.playing {
            background: var(--pad-active);
            color: #000;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .pad-label {
            pointer-events: none;
        }

        .pad-status {
            font-size: 0.7rem;
            position: absolute;
            bottom: 5px;
            opacity: 0.7;
            pointer-events: none;
        }

        /* Global BPM */
        .bpm-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pocket Sampler</h1>

    <div class="panel bpm-panel">
        <div class="slider-group" style="flex: 1; margin: 0;">
            <label>BPM: <span id="bpm-val">120</span></label>
            <input type="range" id="bpm" min="60" max="200" value="120">
        </div>
    </div>

    <div class="panel">
        <h2 id="selected-pad-title">Select a Pad to Record</h2>
        
        <div class="controls-row">
            <button id="record-btn">🔴 Record Mic</button>
        </div>

        <div class="slider-group">
            <label>Start Trim (Splicing): <span id="start-val">0%</span></label>
            <input type="range" id="trim-start" min="0" max="100" value="0">
        </div>
        <div class="slider-group">
            <label>End Trim (Splicing): <span id="end-val">100%</span></label>
            <input type="range" id="trim-end" min="0" max="100" value="100">
        </div>

        <div class="slider-group">
            <label>Pitch Shift: <span id="pitch-val">1.0x</span></label>
            <input type="range" id="fx-pitch" min="0.5" max="2.0" step="0.05" value="1.0">
        </div>
        <div class="slider-group">
            <label>Lo-Fi Distortion: <span id="fx-dist-val">Off</span></label>
            <input type="range" id="fx-dist" min="0" max="100" value="0">
        </div>

        <div class="controls-row">
            <button id="loop-toggle-btn">Loop: OFF</button>
            <div class="slider-group" style="flex: 1; margin: 0;">
                <label>Loop Interval (Beats): <span id="interval-val">4</span></label>
                <input type="range" id="loop-interval" min="1" max="16" step="1" value="4">
            </div>
        </div>
    </div>

    <div class="pad-grid">
        <div class="pad" data-pad="1"><span class="pad-label">Pad 1</span><span class="pad-status">Empty</span></div>
        <div class="pad" data-pad="2"><span class="pad-label">Pad 2</span><span class="pad-status">Empty</span></div>
        <div class="pad" data-pad="3"><span class="pad-label">Pad 3</span><span class="pad-status">Empty</span></div>
        <div class="pad" data-pad="4"><span class="pad-label">Pad 4</span><span class="pad-status">Empty</span></div>
        <div class="pad" data-pad="5"><span class="pad-label">Pad 5</span><span class="pad-status">Empty</span></div>
        <div class="pad" data-pad="6"><span class="pad-label">Pad 6</span><span class="pad-status">Empty</span></div>
    </div>
</div>

<script>
    // --- Audio Architecture ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    
    // Structure to hold data for each pad
    const padsData = {
        1: { rawBuffer: null, start: 0, end: 1, pitch: 1, dist: 0, isLooping: false, interval: 4, timerId: null },
        2: { rawBuffer: null, start: 0, end: 1, pitch: 1, dist: 0, isLooping: false, interval: 4, timerId: null },
        3: { rawBuffer: null, start: 0, end: 1, pitch: 1, dist: 0, isLooping: false, interval: 4, timerId: null },
        4: { rawBuffer: null, start: 0, end: 1, pitch: 1, dist: 0, isLooping: false, interval: 4, timerId: null },
        5: { rawBuffer: null, start: 0, end: 1, pitch: 1, dist: 0, isLooping: false, interval: 4, timerId: null },
        6: { rawBuffer: null, start: 0, end: 1, pitch: 1, dist: 0, isLooping: false, interval: 4, timerId: null },
    };

    let currentPad = 1;
    let mediaRecorder;
    let audioChunks = [];
    let bpm = 120;

    // DOM Elements
    const padsEls = document.querySelectorAll('.pad');
    const recordBtn = document.getElementById('record-btn');
    const trimStartSlider = document.getElementById('trim-start');
    const trimEndSlider = document.getElementById('trim-end');
    const pitchSlider = document.getElementById('fx-pitch');
    const distSlider = document.getElementById('fx-dist');
    const loopToggleBtn = document.getElementById('loop-toggle-btn');
    const loopIntervalSlider = document.getElementById('loop-interval');
    const bpmSlider = document.getElementById('bpm');

    // Initialize Audio Context on first user tap (Android requirement)
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // --- Pad Selection UI Sync ---
    function selectPad(id) {
        currentPad = id;
        padsEls.forEach(p => p.classList.remove('selected'));
        document.querySelector(`[data-pad="${id}"]`).classList.add('selected');
        document.getElementById('selected-pad-title').innerText = `Editing Pad ${id}`;
        
        // Update UI Sliders to match current pad configuration
        const data = padsData[id];
        trimStartSlider.value = data.start * 100;
        document.getElementById('start-val').innerText = Math.round(data.start * 100) + '%';
        trimEndSlider.value = data.end * 100;
        document.getElementById('end-val').innerText = Math.round(data.end * 100) + '%';
        pitchSlider.value = data.pitch;
        document.getElementById('pitch-val').innerText = data.pitch + 'x';
        distSlider.value = data.dist;
        document.getElementById('fx-dist-val').innerText = data.dist > 0 ? data.dist + '%' : 'Off';
        loopToggleBtn.innerText = data.isLooping ? "Loop: ON" : "Loop: OFF";
        loopToggleBtn.style.background = data.isLooping ? "var(--accent-color)" : "#444";
        loopToggleBtn.style.color = data.isLooping ? "#000" : "#fff";
        loopIntervalSlider.value = data.interval;
        document.getElementById('interval-val').innerText = data.interval;
    }

    // --- Audio Processing Engine ---
    function playPad(id) {
        initAudio();
        const data = padsData[id];
        if (!data.rawBuffer) return;

        const padEl = document.querySelector(`[data-pad="${id}"]`);
        padEl.classList.add('playing');
        setTimeout(() => padEl.classList.remove('playing'), 150);

        // 1. Create Source Node
        const source = audioCtx.createBufferSource();
        source.buffer = data.rawBuffer;
        source.playbackRate.value = data.pitch;

        // Calculate Spliced Timings
        const duration = data.rawBuffer.duration;
        const startTime = data.start * duration;
        const durationToPlay = (data.end * duration) - startTime;

        let lastNode = source;

        // 2. Optional Lo-Fi Distortion Node
        if (data.dist > 0) {
            const distortion = audioCtx.createWaveShaper();
            distortion.curve = makeDistortionCurve(data.dist * 2);
            distortion.oversample = '4x';
            lastNode.connect(distortion);
            lastNode = distortion;
        }

        // Connect to Speakers
        lastNode.connect(audioCtx.destination);
        
        // Safety check if dynamic end crop cuts duration short
        if (durationToPlay > 0) {
            source.start(0, startTime, durationToPlay);
        }
    }

    function makeDistortionCurve(amount) {
        const k = typeof amount === 'number' ? amount : 50;
        const n_samples = 44100;
        const curve = new Float32Array(n_samples);
        const deg = Math.PI / 180;
        for (let i = 0 ; i < n_samples; ++i ) {
            const x = (i * 2) / n_samples - 1;
            curve[i] = ( (3 + k) * x * 20 * deg ) / ( Math.PI + k * Math.abs(x) );
        }
        return curve;
    }

    // --- Looping Engine (Clock Based) ---
    function setupLoop(id) {
        const data = padsData[id];
        if (data.timerId) clearInterval(data.timerId);
        
        if (!data.isLooping || !data.rawBuffer) return;

        // Formula: interval in ms = (60 / BPM) * Beats * 1000
        const intervalMs = (60 / bpm) * data.interval * 1000;
        
        // Fire immediately first, then repeat
        playPad(id);
        data.timerId = setInterval(() => {
            playPad(id);
        }, intervalMs);
    }

    // --- Recording Logic ---
    recordBtn.addEventListener('click', async () => {
        initAudio();
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            recordBtn.classList.remove('recording');
            recordBtn.innerText = "🔴 Record Mic";
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    
                    audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                        padsData[currentPad].rawBuffer = buffer;
                        const statusEl = document.querySelector(`[data-pad="${currentPad}"] .pad-status`);
                        statusEl.innerText = "Sampled";
                        // Reset settings roughly for new recordings
                        padsData[currentPad].start = 0;
                        padsData[currentPad].end = 1;
                        selectPad(currentPad); 
                    });
                };

                mediaRecorder.start();
                recordBtn.classList.add('recording');
                recordBtn.innerText = "🛑 Stop Recording";
            } catch (err) {
                alert("Microphone access denied or unsupported on this device environment.");
            }
        }
    });

    // --- UI Event Listeners ---
    padsEls.forEach(pad => {
        // Support both desktop click and quick mobile touchstart
        ['touchstart', 'mousedown'].forEach(evtType => {
            pad.addEventListener(evtType, (e) => {
                e.preventDefault();
                const id = parseInt(pad.dataset.pad);
                selectPad(id);
                playPad(id);
            });
        });
    });

    trimStartSlider.addEventListener('input', (e) => {
        const val = e.target.value / 100;
        if (val < padsData[currentPad].end) {
            padsData[currentPad].start = val;
            document.getElementById('start-val').innerText = e.target.value + '%';
        } else {
            e.target.value = padsData[currentPad].start * 100;
        }
    });

    trimEndSlider.addEventListener('input', (e) => {
        const val = e.target.value / 100;
        if (val > padsData[currentPad].start) {
            padsData[currentPad].end = val;
            document.getElementById('end-val').innerText = e.target.value + '%';
        } else {
            e.target.value = padsData[currentPad].end * 100;
        }
    });

    pitchSlider.addEventListener('input', (e) => {
        padsData[currentPad].pitch = parseFloat(e.target.value);
        document.getElementById('pitch-val').innerText = e.target.value + 'x';
    });

    distSlider.addEventListener('input', (e) => {
        padsData[currentPad].dist = parseInt(e.target.value);
        document.getElementById('fx-dist-val').innerText = e.target.value > 0 ? e.target.value + '%' : 'Off';
    });

    loopToggleBtn.addEventListener('click', () => {
        const data = padsData[currentPad];
        data.isLooping = !data.isLooping;
        setupLoop(currentPad);
        selectPad(currentPad); // Refresh UI styling for the loop button state
    });

    loopIntervalSlider.addEventListener('input', (e) => {
        padsData[currentPad].interval = parseInt(e.target.value);
        document.getElementById('interval-val').innerText = e.target.value;
        if(padsData[currentPad].isLooping) {
            setupLoop(currentPad); // Dynamic recalculation if changing interval live
        }
    });

    bpmSlider.addEventListener('input', (e) => {
        bpm = parseInt(e.target.value);
        document.getElementById('bpm-val').innerText = bpm;
        // Dynamically adjust all actively running loops to match new tempo
        for (let id in padsData) {
            if (padsData[id].isLooping) setupLoop(id);
        }
    });

    // Default select pad 1 on boot
    selectPad(1);
</script>
</body>
</html>
