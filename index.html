<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonPad Pro - Pocket Sampler</title>
    <style>
        :root {
            --bg-dark: #0a0b0d;
            --panel-bg: #14161d;
            --panel-border: #222633;
            --accent-neon: #00ffcc;
            --accent-alert: #ff3366;
            --text-main: #f0f2f5;
            --text-muted: #6c7a9c;
            --pad-empty: #1e2230;
            --pad-ready: #2d354d;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 12px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Header & Master Controls */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 12px;
            border-radius: 12px;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
            color: var(--accent-neon);
            text-transform: uppercase;
        }

        .master-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .bpm-control {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.2);
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
        }

        .bpm-control label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        .bpm-control input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: bold;
            width: 40px;
            text-align: center;
            outline: none;
        }

        .mute-btn {
            background: #ff336622;
            border: 1px solid var(--accent-alert);
            color: var(--accent-alert);
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        .mute-btn.active {
            background: var(--accent-alert);
            color: #000;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.4);
        }

        /* Editor Panel */
        .editor-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-header {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 700;
        }

        .record-btn {
            background: linear-gradient(135deg, #2c151b 0%, #1a0a0d 100%);
            border: 1px solid var(--accent-alert);
            color: var(--accent-alert);
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .record-btn.recording {
            background: var(--accent-alert);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
        }

        /* FX Grid Layout */
        .fx-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            padding: 8px;
            border-radius: 8px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .control-label span {
            color: var(--text-main);
            font-weight: bold;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #252a3a;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-neon);
            cursor: pointer;
        }

        .loop-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.15);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid var(--panel-border);
        }

        .loop-toggle {
            background: #252a3a;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        .loop-toggle.active {
            border-color: var(--accent-neon);
            color: var(--accent-neon);
            background: rgba(0, 255, 204, 0.05);
        }

        /* Pad Hardware Grid */
        .grid-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 12px;
        }

        .pad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .pad {
            background: var(--pad-empty);
            border: 1px solid #1c202e;
            border-radius: 10px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.4);
        }

        .pad.has-sample {
            background: var(--pad-ready);
            border-color: #3d4766;
        }

        .pad.selected {
            border: 2px solid var(--accent-neon);
        }

        .pad.playing {
            background: var(--accent-neon) !important;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.4), 0 0 15px var(--accent-neon);
        }

        .pad.playing * {
            color: #050608 !important;
        }

        .pad-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .pad.has-sample .pad-label {
            color: var(--text-main);
        }

        .pad-status {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <h1>NeonPad Pro</h1>
        <div class="master-actions">
            <button id="mute-all-btn" class="mute-btn">Mute Loops</button>
            <div class="bpm-control">
                <label>BPM</label>
                <input type="number" id="bpm" min="60" max="220" value="120">
            </div>
        </div>
    </div>

    <div class="editor-panel">
        <div class="panel-header" id="selected-pad-title">Select a pad</div>
        <button id="record-btn" class="record-btn">● Record Mic</button>

        <div class="fx-grid">
            <div class="control-group">
                <div class="control-label">Trim Start <span id="start-val">0%</span></div>
                <input type="range" id="trim-start" min="0" max="100" value="0">
            </div>
            <div class="control-group">
                <div class="control-label">Trim End <span id="end-val">100%</span></div>
                <input type="range" id="trim-end" min="0" max="100" value="100">
            </div>

            <div class="control-group">
                <div class="control-label">Pitch <span id="pitch-val">1.0x</span></div>
                <input type="range" id="fx-pitch" min="0.5" max="2.0" step="0.05" value="1.0">
            </div>
            <div class="control-group">
                <div class="control-label">Bit-Grind <span id="fx-dist-val">Off</span></div>
                <input type="range" id="fx-dist" min="0" max="100" value="0">
            </div>

            <div class="control-group">
                <div class="control-label">Filter Cutoff <span id="fx-filter-val">Max</span></div>
                <input type="range" id="fx-filter" min="200" max="20000" step="100" value="20000">
            </div>
            <div class="control-group">
                <div class="control-label">Delay Echo <span id="fx-delay-val">Off</span></div>
                <input type="range" id="fx-delay" min="0" max="90" value="0">
            </div>
        </div>

        <div class="loop-bar">
            <button id="loop-toggle-btn" class="loop-toggle">Loop Off</button>
            <div class="control-group" style="flex: 1; border: none; padding: 0; background: transparent;">
                <div class="control-label">Loop Sync <span id="interval-val">4 Beats</span></div>
                <input type="range" id="loop-interval" min="1" max="16" step="1" value="4">
            </div>
        </div>
    </div>

    <div class="grid-panel">
        <div class="pad-grid">
            <div class="pad" data-pad="1"><span class="pad-label">PAD 1</span><span class="pad-status">Empty</span></div>
            <div class="pad" data-pad="2"><span class="pad-label">PAD 2</span><span class="pad-status">Empty</span></div>
            <div class="pad" data-pad="3"><span class="pad-label">PAD 3</span><span class="pad-status">Empty</span></div>
            <div class="pad" data-pad="4"><span class="pad-label">PAD 4</span><span class="pad-status">Empty</span></div>
            <div class="pad" data-pad="5"><span class="pad-label">PAD 5</span><span class="pad-status">Empty</span></div>
            <div class="pad" data-pad="6"><span class="pad-label">PAD 6</span><span class="pad-status">Empty</span></div>
            <div class="pad" data-pad="7"><span class="pad-label">PAD 7</span><span class="pad-status">Empty</span></div>
            <div class="pad" data-pad="8"><span class="pad-label">PAD 8</span><span class="pad-status">Empty</span></div>
        </div>
    </div>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    
    const padsData = {};
    for (let i = 1; i <= 8; i++) {
        padsData[i] = { 
            rawBuffer: null, start: 0, end: 1, pitch: 1, dist: 0, 
            filter: 20000, delayMix: 0, isLooping: false, interval: 4, timerId: null 
        };
    }

    let currentPad = 1;
    let mediaRecorder;
    let audioChunks = [];
    let bpm = 120;
    let globalMute = false;

    // DOM Links
    const padsEls = document.querySelectorAll('.pad');
    const recordBtn = document.getElementById('record-btn');
    const muteAllBtn = document.getElementById('mute-all-btn');
    const trimStartSlider = document.getElementById('trim-start');
    const trimEndSlider = document.getElementById('trim-end');
    const pitchSlider = document.getElementById('fx-pitch');
    const distSlider = document.getElementById('fx-dist');
    const filterSlider = document.getElementById('fx-filter');
    const delaySlider = document.getElementById('fx-delay');
    const loopToggleBtn = document.getElementById('loop-toggle-btn');
    const loopIntervalSlider = document.getElementById('loop-interval');
    const bpmInput = document.getElementById('bpm');

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function selectPad(id) {
        currentPad = id;
        padsEls.forEach(p => p.classList.remove('selected'));
        document.querySelector(`[data-pad="${id}"]`).classList.add('selected');
        document.getElementById('selected-pad-title').innerText = `Modulating Pad ${id}`;
        
        const data = padsData[id];
        trimStartSlider.value = data.start * 100;
        document.getElementById('start-val').innerText = Math.round(data.start * 100) + '%';
        trimEndSlider.value = data.end * 100;
        document.getElementById('end-val').innerText = Math.round(data.end * 100) + '%';
        pitchSlider.value = data.pitch;
        document.getElementById('pitch-val').innerText = data.pitch.toFixed(2) + 'x';
        distSlider.value = data.dist;
        document.getElementById('fx-dist-val').innerText = data.dist > 0 ? data.dist + '%' : 'Off';
        filterSlider.value = data.filter;
        document.getElementById('fx-filter-val').innerText = data.filter === 20000 ? 'Max' : data.filter + 'Hz';
        delaySlider.value = data.delayMix;
        document.getElementById('fx-delay-val').innerText = data.delayMix > 0 ? data.delayMix + '%' : 'Off';
        
        if (data.isLooping) {
            loopToggleBtn.innerText = "Loop On";
            loopToggleBtn.classList.add('active');
        } else {
            loopToggleBtn.innerText = "Loop Off";
            loopToggleBtn.classList.remove('active');
        }
        loopIntervalSlider.value = data.interval;
        document.getElementById('interval-val').innerText = data.interval + (data.interval === 1 ? ' Beat' : ' Beats');
    }

    function playPad(id, isLoopTrigger = false) {
        if (globalMute && isLoopTrigger) return; 
        
        initAudio();
        const data = padsData[id];
        if (!data.rawBuffer) return;

        const padEl = document.querySelector(`[data-pad="${id}"]`);
        padEl.classList.add('playing');
        setTimeout(() => padEl.classList.remove('playing'), 120);

        const source = audioCtx.createBufferSource();
        source.buffer = data.rawBuffer;
        source.playbackRate.value = data.pitch;

        const duration = data.rawBuffer.duration;
        const startTime = data.start * duration;
        const durationToPlay = (data.end * duration) - startTime;

        let currentNode = source;

        if (data.dist > 0) {
            const distortion = audioCtx.createWaveShaper();
            distortion.curve = makeDistortionCurve(data.dist * 2);
            distortion.oversample = '4x';
            currentNode.connect(distortion);
            currentNode = distortion;
        }

        if (data.filter < 20000) {
            const filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(data.filter, audioCtx.currentTime);
            currentNode.connect(filterNode);
            currentNode = filterNode;
        }

        if (data.delayMix > 0) {
            const delayNode = audioCtx.createDelay();
            const feedbackNode = audioCtx.createGain();
            const mixNode = audioCtx.createGain();

            delayNode.delayTime.value = (60 / bpm) * 0.5; 
            feedbackNode.gain.value = 0.4; 
            mixNode.gain.value = data.delayMix / 100;

            currentNode.connect(audioCtx.destination); 
            
            currentNode.connect(delayNode);
            delayNode.connect(feedbackNode);
            feedbackNode.connect(delayNode); 
            delayNode.connect(mixNode);
            mixNode.connect(audioCtx.destination);
        } else {
            currentNode.connect(audioCtx.destination);
        }

        if (durationToPlay > 0) {
            source.start(0, startTime, durationToPlay);
        }
    }

    function makeDistortionCurve(amount) {
        const k = amount;
        const n_samples = 44100;
        const curve = new Float32Array(n_samples);
        const deg = Math.PI / 180;
        for (let i = 0 ; i < n_samples; ++i ) {
            const x = (i * 2) / n_samples - 1;
            curve[i] = ( (3 + k) * x * 20 * deg ) / ( Math.PI + k * Math.abs(x) );
        }
        return curve;
    }

    function setupLoop(id) {
        const data = padsData[id];
        if (data.timerId) clearInterval(data.timerId);
        if (!data.isLooping || !data.rawBuffer) return;

        const intervalMs = (60 / bpm) * data.interval * 1000;
        playPad(id, true);
        data.timerId = setInterval(() => playPad(id, true), intervalMs);
    }

    function setupFastTap(element, callback) {
        element.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            callback(e);
        }, { passive: false });

        element.addEventListener('mousedown', (e) => {
            if (e.button === 0) callback(e);
        });
    }

    setupFastTap(muteAllBtn, () => {
        globalMute = !globalMute;
        if (globalMute) {
            muteAllBtn.innerText = "Loops Muted";
            muteAllBtn.classList.add('active');
        } else {
            muteAllBtn.innerText = "Mute Loops";
            muteAllBtn.classList.remove('active');
        }
    });

    setupFastTap(loopToggleBtn, () => {
        const data = padsData[currentPad];
        data.isLooping = !data.isLooping;
        setupLoop(currentPad);
        selectPad(currentPad);
    });

    setupFastTap(recordBtn, async () => {
        initAudio();
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            recordBtn.classList.remove('recording');
            recordBtn.innerText = "● Record Mic";
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    
                    audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                        padsData[currentPad].rawBuffer = buffer;
                        const targetPad = document.querySelector(`[data-pad="${currentPad}"]`);
                        targetPad.classList.add('has-sample');
                        targetPad.querySelector('.pad-status').innerText = "Assigned";
                        selectPad(currentPad); 
                    });
                };

                mediaRecorder.start();
                recordBtn.classList.add('recording');
                recordBtn.innerText = "■ Stop Recording";
            } catch (err) {
                alert("Audio device input error.");
            }
        }
    });

    padsEls.forEach(pad => {
        setupFastTap(pad, () => {
            const id = parseInt(pad.dataset.pad);
            selectPad(id);
            playPad(id, false);
        });
    });

    trimStartSlider.addEventListener('input', (e) => {
        const val = e.target.value / 100;
        if (val <
